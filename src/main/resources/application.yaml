spring:
  mail:
    host: smtp.163.com
    port: 465
    username: dmregy@163.com
    password: VPbQ2X9N2gM6PANi
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            required: true
          starttls:
            enable: false
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# 文件上传配置
file:
  upload:
    path: ./upload/
    prefix: /api/files/
    server-address: http://localhost:8080


# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.laoliu.system.controller

# 阿里云OSS配置
aliyun:
  oss:
    endpoint: YourEndpoint
    access-key-id: YourAccessKeyId
    access-key-secret: YourAccessKeySecret
    bucket-name: YourBucketName

# Qwen API 配置
qwen:
  # 请在此处填入您的DashScope API Key
  api-key: ${QWEN_API_KEY:Your_Key_here}
  api-url: https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation
  timeout: 30000
