spring.application.name=CampusAppointmentSystem

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=2000ms

# Email Configuration
email.subject=Campus Appointment System Verification Code
email.content=Your verification code is:
email.code.expiration=300
email.send.frequency.limit=60

# JWT Configuration
jwt.secret=campus_app_secret_key_for_verification
jwt.expiration=7200000